id: io.github.martinrotter.rssguard
runtime: org.kde.Platform
runtime-version: '6.8'
base: io.qt.qtwebengine.BaseApp
base-version: '6.8'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
command: rssguard

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --filesystem=xdg-download
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --system-talk-name=org.freedesktop.UPower

cleanup:
  - /lib/*.a

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: libmpv
    buildsystem: meson
    config-opts:
      - -Dbuild-date=false
      - -Dcplayer=false
      - -Dlibmpv=true
      - -Dlua=enabled
      - -Dmanpage-build=disabled
    sources:
      - type: archive
        dest-filename: mpv.tar.gz
        url: https://api.github.com/repos/mpv-player/mpv/tarball/v0.40.0
        sha256: 71a0ca9c5dbc0d1f9d252599f5b3ad5ad07f0aefd50f5e8b713105e1c9d2732d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/mpv-player/mpv/releases/latest
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
          url-query: .tarball_url
    modules:
      - shared-modules/luajit/luajit.json

      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Ddemos=false
        cleanup:
          - /include
          - /lib/pkgconfig
        sources:
          - type: git
            url: https://github.com/haasn/libplacebo.git
            tag: v7.351.0
            commit: 3188549fba13bbdf3a5a98de2a38c2e71f04e21e
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$

      - name: libass
        cleanup:
          - /include
          - /lib/*.la
          - /lib/pkgconfig
        config-opts:
          - --disable-static
        sources:
          - type: archive
            url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
            sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a
            x-checker-data:
              type: anitya
              project-id: 1560
              stable-only: true
              url-template: https://github.com/libass/libass/releases/download/$version/libass-$version.tar.xz

      - name: libXpresent
        cleanup:
          - /share/man
        buildsystem: autotools
        sources:
          - type: archive
            url: https://xorg.freedesktop.org/archive/individual/lib/libXpresent-1.0.2.tar.xz
            sha256: 4e5b21b4812206a4b223013606ae31170502c1043038777a1ef8f70c09d37602
            x-checker-data:
              type: anitya
              project-id: 17166
              stable-only: true
              url-template: https://xorg.freedesktop.org/archive/individual/lib/libXpresent-$version.tar.xz

  - name: deno
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/deno/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release
      - install -Dm0755 target/release/deno -t ${FLATPAK_DEST}/bin
    sources:
      - type: archive
        url: https://github.com/denoland/deno/archive/refs/tags/v2.5.6.tar.gz
        sha256: cc12a16d167f754f6e473fa8dba6a7a536761463091c15c44b4a6d43ac80c5f5
        x-checker-data:
          type: anitya
          project-id: 133196
          stable-only: true
          url-template: https://github.com/denoland/deno/archive/refs/tags/v$version.tar.gz
      - cargo-sources-deno.json
    modules:
      - name: rusty_v8
        buildsystem: simple
        build-options:
          append-path: /usr/lib/sdk/rust-stable/bin
          env:
            CARGO_HOME: /run/build/rusty_v8/cargo
            CARGO_NET_OFFLINE: 'true'
            V8_FROM_SOURCE: '1'
            DISABLE_CLANG: '1'
        build-commands:
          - cargo --offline fetch --manifest-path Cargo.toml --verbose
          - ls -l third_party/rust-toolchain
          - cargo build --offline -vv
          - ls -laR
        sources:
          - type: git
            url: https://github.com/denoland/rusty_v8.git
            commit: 4d5b674273ffc51f6293fcc43f93af16fefc1106
            tag: v142.1.0
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
          - cargo-sources-rusty_v8.json
          # https://github.com/denoland/rusty_v8/blob/v142.1.0/tools/rust_toolchain.py
          # https://github.com/denoland/rusty_v8/blob/v142.1.0/tools/v8_deps.py
          # https://github.com/denoland/v8/blob/d86ca95b57fb8a0e6dc8c5951a78adc9b8832512/DEPS
          # https://raw.githubusercontent.com/denoland/rusty_v8/refs/tags/v142.1.0/tools/download_file.py
          - type: archive
            dest: third_party/rust-toolchain
            strip-components: 0
            url: https://storage.googleapis.com/chromium-browser-clang/Linux_x64/rust-toolchain-15283f6fe95e5b604273d13a428bab5fc0788f5a-1-llvmorg-22-init-8940-g4d4cb757.tar.xz
            sha256: 2bdaea0b11cb11a8f2f4dcb79b0dbb4bf38e2bd22479ff8014f55b9b6890e135
        modules:
          - name: gn
            buildsystem: simple
            build-options:
              env:
                CC: gcc
                CXX: g++
            build-commands:
              - ./build/gen.py
              - ninja -C out gn
              - install -Dm755 out/gn "$FLATPAK_DEST/bin/gn"
            sources:
              - type: git
                url: https://gn.googlesource.com/gn
                commit: 748c9571f3d18820a7989a880d5ddf220e54af1b
                disable-shallow-clone: true

  - name: yt-dlp
    no-autogen: true
    no-make-install: true
    make-args:
      - yt-dlp
      - PYTHON=/usr/bin/python3
    post-install:
      - install yt-dlp /app/bin
    sources:
      - type: archive
        dest-filename: yt-dlp.tar.gz
        url: https://github.com/yt-dlp/yt-dlp/archive/refs/tags/2025.11.12.tar.gz
        sha256: 6f5f2d716968d6c84d05d179fc1ce50ccca23706b9dbbc3c57fec97a8b9ea440
        x-checker-data:
          type: anitya
          project-id: 143399
          stable-only: true
          url-template: https://github.com/yt-dlp/yt-dlp/archive/refs/tags/$version.tar.gz

  - name: nodejs-and-npm
    buildsystem: simple
    build-commands:
      - mkdir -p /app/{bin,lib}
      - cp -a /usr/lib/sdk/node20/bin/{node,npm} /app/bin
      - cp -a /usr/lib/sdk/node20/lib/* /app/lib

  - name: clang-format
    buildsystem: simple
    build-commands:
      - |
        cmake -S llvm -B builddir \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DCMAKE_INSTALL_LIBDIR=/app/lib \
          -DCMAKE_INSTALL_PREFIX=/app \
          -DBUILD_SHARED_LIBS=OFF \
          -DLLVM_ENABLE_PROJECTS=clang
      - cmake --build builddir --parallel $(nproc) --target clang-format
      - install -Dt /app/bin builddir/bin/clang-format
    sources:
      - type: archive
        url: https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.5/llvm-project-21.1.5.src.tar.xz
        sha256: 1794be4bf974e99a3fe1da4b2b9b1456c02ae9479c942f365441d8d207bd650c
        x-checker-data:
          type: json
          url: https://api.github.com/repos/llvm/llvm-project/releases/latest
          version-query: .tag_name | sub("^llvmorg-"; "")
          url-query: .assets[] | select(.name == "llvm-project-" + $version + ".src.tar.xz").browser_download_url

  - name: rssguard
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_WITH_QT6=ON
      - -DENABLE_COMPRESSED_SITEMAP=ON
      - -DENABLE_MEDIAPLAYER_LIBMPV=ON
      - -DENABLE_MEDIAPLAYER_QTMULTIMEDIA=OFF
      - -DFORCE_BUNDLE_ICONS=ON
      - -DIS_FLATPAK_BUILD=ON
      - -DNO_LITE=ON
      - -DNO_UPDATE_CHECK=ON
    sources:
      - type: archive
        dest-filename: rssguard.tar.gz
        url: https://api.github.com/repos/martinrotter/rssguard/tarball/4.8.6
        sha256: c1ec4ce2157240679bb5e3d5f1d8b3fef3553b88723673313ac2a1bfe28143fe
        x-checker-data:
          type: json
          url: https://api.github.com/repos/martinrotter/rssguard/releases/latest
          version-query: .tag_name
          url-query: .tarball_url
      # https://github.com/martinrotter/rssguard/commit/7ec01c8dbafe45b55f133b0fd89384e8cb953abe
      - type: patch
        paths:
          - patches/0001-Set-a-fixed-release-date.patch
          - patches/Update-ghostery-adblocker-version.patch
    cleanup:
      - /include
