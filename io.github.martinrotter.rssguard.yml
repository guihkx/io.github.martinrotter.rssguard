id: io.github.martinrotter.rssguard
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang # To build rssguard-article-extractor
command: rssguard

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: libmpv
    buildsystem: meson
    config-opts:
      - -Dbuild-date=false
      - -Dcplayer=false
      - -Dlibmpv=true
      - -Dlua=enabled
      - -Dmanpage-build=disabled
    sources:
      - type: archive
        dest-filename: mpv.tar.gz
        url: https://api.github.com/repos/mpv-player/mpv/tarball/v0.40.0
        sha256: 71a0ca9c5dbc0d1f9d252599f5b3ad5ad07f0aefd50f5e8b713105e1c9d2732d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/mpv-player/mpv/releases/latest
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
          url-query: .tarball_url
    cleanup:
      - /include
      - /lib/pkgconfig
    modules:
      - shared-modules/luajit/luajit.json

      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Ddemos=false
        cleanup:
          - /include
          - /lib/pkgconfig
        sources:
          - type: git
            url: https://github.com/haasn/libplacebo.git
            tag: v7.351.0
            commit: 3188549fba13bbdf3a5a98de2a38c2e71f04e21e
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
          - type: patch
            # https://github.com/haasn/libplacebo/commit/12509c0f1ee8c22ae163017f0a5e7b8a9d983a17
            path: patches/0001-vulkan-utils_gen-fix-for-python-3.14.patch

      - name: libass
        config-opts:
          - --disable-static
        sources:
          - type: archive
            url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
            sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a
            x-checker-data:
              type: anitya
              project-id: 1560
              stable-only: true
              url-template: https://github.com/libass/libass/releases/download/$version/libass-$version.tar.xz
        cleanup:
          - /include
          - /lib/*.la
          - /lib/pkgconfig

      - name: libXpresent
        config-opts:
          - --disable-static
        sources:
          - type: archive
            url: https://xorg.freedesktop.org/archive/individual/lib/libXpresent-1.0.2.tar.xz
            sha256: 4e5b21b4812206a4b223013606ae31170502c1043038777a1ef8f70c09d37602
            x-checker-data:
              type: anitya
              project-id: 17166
              stable-only: true
              url-template: https://xorg.freedesktop.org/archive/individual/lib/libXpresent-$version.tar.xz
        cleanup:
          - /include
          - /lib/*.la
          - /lib/pkgconfig
          - /share/man

  # yt-dlp build from PyPI, with yt-dlp-ejs (https://github.com/yt-dlp/yt-dlp/wiki/EJS).
  # Generated with: flatpak-pip-generator --runtime=org.freedesktop.Sdk//24.08 --checker-data yt-dlp[default]
  - python3-yt-dlp.json

  # Required by yt-dlp. More specifically, by yt-dlp-ejs: https://github.com/yt-dlp/yt-dlp/wiki/EJS
  - name: deno
    buildsystem: simple
    build-commands:
      - install -Dm0755 deno -t /app/bin
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/denoland/deno/releases/download/v2.6.2/deno-x86_64-unknown-linux-gnu.zip
        sha256: b1db28f36d675a270dbde4a423cd3e58bba4783eaea4b4015e84a9cbac3e2b4f
        x-checker-data:
          type: anitya
          project-id: 133196
          stable-only: true
          url-template: https://github.com/denoland/deno/releases/download/v$version/deno-x86_64-unknown-linux-gnu.zip
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/denoland/deno/releases/download/v2.6.2/deno-aarch64-unknown-linux-gnu.zip
        sha256: ebd91ecb0085ce9f0be5c7d7e29bffa7ccee5cb58dcd808792009b45df68af7a
        x-checker-data:
          type: anitya
          project-id: 133196
          stable-only: true
          url-template: https://github.com/denoland/deno/releases/download/v$version/deno-aarch64-unknown-linux-gnu.zip

  - name: clang-format
    buildsystem: simple
    build-commands:
      - |
        cmake -S llvm -B builddir \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DCMAKE_INSTALL_LIBDIR=/app/lib \
          -DCMAKE_INSTALL_PREFIX=/app \
          -DBUILD_SHARED_LIBS=OFF \
          -DLLVM_ENABLE_PROJECTS=clang
      - cmake --build builddir --parallel $(nproc) --target clang-format
      - install -Dt /app/bin builddir/bin/clang-format
    sources:
      - type: archive
        url: https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/llvm-project-21.1.8.src.tar.xz
        sha256: 4633a23617fa31a3ea51242586ea7fb1da7140e426bd62fc164261fe036aa142
        x-checker-data:
          type: json
          url: https://api.github.com/repos/llvm/llvm-project/releases/latest
          version-query: .tag_name | sub("^llvmorg-"; "")
          url-query: .assets[] | select(.name == "llvm-project-" + $version + ".src.tar.xz").browser_download_url

  - name: rssguard
    buildsystem: cmake-ninja
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOROOT: /usr/lib/sdk/golang
    config-opts:
      - -DIS_FLATPAK_BUILD=ON
      - -DNO_UPDATE_CHECK=ON
    sources:
      - type: git
        url: https://github.com/martinrotter/rssguard.git
        commit: bcb3f77cec497b824674e4d165c8c2736c41367e
        # tag: 5.0.0
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$
      # Go dependencies for rssguard-article-extractor.
      # Generated with:
      # $ go run github.com/dennwc/flatpak-go-mod@956509d \
      #   -module-name rssguard-article-extractor \
      #   -dest-pref resources/scripts/standalone/article-extractor/ \
      #   /path/to/rssguard/resources/scripts/standalone/article-extractor
      # Then, copy both 'rssguard-article-extractor.go.mod.yml' and 'rssguard-article-extractor.modules.txt' here.
      - rssguard-article-extractor.go.mod.yml
    cleanup:
      - /include
